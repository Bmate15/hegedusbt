		<script>
			// Betölti a sidebar.html tartalmát a konténerbe

		</script>

        <script>
            $(document).ready(function(){
                // Amikor rákattintanak egy termék képére
                $('#main .posts article .image img').on('click', function(e){
                    e.preventDefault(); // Megakadályozzuk, hogy felugorjon az oldal tetejére
                    var src = $(this).attr('src'); // Kinyerjük a kép URL-jét
                    $('#full-image').attr('src', src); // Átadjuk a rejtett nagy képnek
                    $('#image-modal').fadeIn(300); // Megjelenítjük a sötét hátteret
                });

                // Bezárás, ha az X-re vagy a sötét háttérre kattintanak
                $('.modal .close, .modal').on('click', function(e){
                    if (e.target !== document.getElementById('full-image')) {
                        $('#image-modal').fadeOut(300); // Eltüntetjük
                    }
                });
            });
        </script>
